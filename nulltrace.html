<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>NULLTRACE // SIMULATEUR</title>
<style>
  :root{
    --bg:#050705;
    --phosphor:#39ff6a;
    --phosphor-dim:#0f5c26;
    --amber:#ffb000;
    --red:#ff3b3b;
    --white:#d8ffe0;
    --panel:#0a120a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg); overflow:hidden;
    font-family:'Courier New', monospace;
    color:var(--phosphor);
    touch-action:none; user-select:none;
  }
  #app{ position:relative; width:100%; height:100vh; overflow:hidden; }
  .scanlines{
    position:absolute; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,255,100,0.035) 3px);
    mix-blend-mode:overlay;
  }
  .vignette{ position:absolute; inset:0; pointer-events:none; z-index:51; box-shadow: inset 0 0 150px 40px rgba(0,0,0,0.85); }

  .screen{
    position:absolute; inset:0; display:flex; flex-direction:column;
    padding:16px; overflow-y:auto;
  }
  .hidden{ display:none !important; }

  /* ---- Boot ---- */
  #boot{ justify-content:center; align-items:flex-start; padding:24px; }
  .boot-line{ font-size:13px; color:var(--phosphor-dim); margin:2px 0; opacity:0; }
  .boot-line.show{ opacity:1; color:var(--phosphor); }

  /* ---- Topbar ---- */
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    font-size:11px; letter-spacing:1px; color:var(--phosphor-dim);
    border-bottom:1px solid var(--phosphor-dim); padding-bottom:8px; margin-bottom:10px;
  }
  .topbar b{ color:var(--phosphor); text-shadow:0 0 6px rgba(57,255,106,0.6); }
  .stat{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  .stat .v{ color:var(--amber); font-size:14px; text-shadow:0 0 6px rgba(255,176,0,0.6); }

  h1.logo{
    font-size:26px; letter-spacing:3px; margin:6px 0 2px;
    text-shadow:0 0 12px rgba(57,255,106,0.9), 0 0 26px rgba(57,255,106,0.35);
  }
  .logo span{ color:var(--amber); }
  .tagline{ font-size:11px; color:var(--phosphor-dim); letter-spacing:2px; margin-bottom:16px; }

  /* ---- Node list ---- */
  .node{
    border:1px solid var(--phosphor-dim);
    background:rgba(57,255,106,0.03);
    padding:12px; margin-bottom:10px; border-radius:2px;
    display:flex; justify-content:space-between; align-items:center;
    gap:10px;
  }
  .node.locked{ opacity:0.4; }
  .node .info{ flex:1; text-align:left; }
  .node .name{ font-size:14px; color:var(--white); letter-spacing:1px; }
  .node .meta{ font-size:10px; color:var(--phosphor-dim); margin-top:3px; }
  .diff{ padding:2px 6px; font-size:9px; border:1px solid currentColor; border-radius:2px; }
  .diff.low{ color:var(--phosphor); }
  .diff.mid{ color:var(--amber); }
  .diff.high{ color:var(--red); }

  .btn{
    border:1px solid var(--phosphor); color:var(--phosphor);
    background:rgba(57,255,106,0.06); padding:10px 18px;
    font-size:13px; letter-spacing:2px; font-family:inherit;
    cursor:pointer; white-space:nowrap; border-radius:2px;
  }
  .btn:active{ background:rgba(57,255,106,0.3); }
  .btn.amber{ border-color:var(--amber); color:var(--amber); background:rgba(255,176,0,0.06); }
  .btn.red{ border-color:var(--red); color:var(--red); background:rgba(255,59,59,0.06); }
  .btn.big{ display:block; width:100%; padding:16px; font-size:15px; margin-top:8px; }
  .btn:disabled{ opacity:0.35; }

  .center{ display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; gap:10px; }

  /* ---- Hack screen ---- */
  #hackScreen .headline{ font-size:13px; color:var(--amber); letter-spacing:2px; margin-bottom:4px; }
  #hackScreen .sub{ font-size:11px; color:var(--phosphor-dim); margin-bottom:16px; }
  .progressWrap{ width:100%; height:6px; background:rgba(57,255,106,0.08); margin:14px 0; border:1px solid var(--phosphor-dim); }
  .progressBar{ height:100%; background:var(--phosphor); width:0%; box-shadow:0 0 8px rgba(57,255,106,0.7); transition:width 0.15s; }

  /* memory sequence minigame */
  .padGrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; max-width:280px; margin:20px auto; }
  .pad{
    aspect-ratio:1; border:2px solid var(--phosphor-dim); border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; color:var(--phosphor-dim); background:rgba(57,255,106,0.02);
  }
  .pad.flash{ background:var(--phosphor); color:#000; box-shadow:0 0 20px rgba(57,255,106,0.9); border-color:var(--phosphor); }
  .pad.correct{ border-color:var(--phosphor); color:var(--phosphor); }
  .pad.wrong{ border-color:var(--red); color:var(--red); }

  /* typing minigame */
  #typeTarget{
    font-size:20px; letter-spacing:3px; padding:14px; border:1px solid var(--phosphor-dim);
    background:rgba(57,255,106,0.03); margin:14px 0; word-break:break-all; min-height:30px;
  }
  #typeTarget .ok{ color:var(--phosphor); }
  #typeTarget .todo{ color:var(--phosphor-dim); }
  #typeInput{
    width:100%; background:#000; border:1px solid var(--phosphor); color:var(--phosphor);
    font-family:inherit; font-size:16px; padding:12px; letter-spacing:2px; text-align:center;
    border-radius:2px;
  }
  #typeInput:focus{ outline:none; box-shadow:0 0 10px rgba(57,255,106,0.5); }

  .log{ font-size:10px; color:var(--phosphor-dim); text-align:left; margin-top:16px; max-height:80px; overflow-y:auto; width:100%; }

  .flicker{ animation:flicker 0.15s steps(2) 3; }
  @keyframes flicker{ 50%{ opacity:0.3; } }

  .blink{ animation: blinkOp 1.1s steps(1) infinite; }
  @keyframes blinkOp{ 50%{opacity:0;} }
</style>
</head>
<body>
<div id="app">

  <!-- BOOT -->
  <div id="boot" class="screen"></div>

  <!-- MAIN MENU (node list) -->
  <div id="menuScreen" class="screen hidden">
    <div class="topbar">
      <div class="stat"><span>REP</span><span class="v" id="repVal">0</span></div>
      <b>NULLTRACE</b>
      <div class="stat"><span>CRÉDITS</span><span class="v" id="creditVal">0</span></div>
    </div>
    <h1 class="logo">NULL<span>TRACE</span></h1>
    <div class="tagline">SIMULATEUR D'INTRUSION — ENVIRONNEMENT FICTIF</div>
    <div id="nodeList"></div>
  </div>

  <!-- HACK SCREEN -->
  <div id="hackScreen" class="screen hidden">
    <div class="topbar">
      <span id="hackNodeName">NODE</span>
      <button class="btn red" id="abortBtn" style="padding:6px 12px; font-size:11px;">ABANDONNER</button>
    </div>
    <div class="headline" id="hackHeadline">PHASE 1 — SÉQUENCE MÉMOIRE</div>
    <div class="sub" id="hackSub">Reproduis la séquence affichée</div>
    <div class="progressWrap"><div class="progressBar" id="hackProgress"></div></div>

    <div id="memGame">
      <div class="padGrid" id="padGrid"></div>
    </div>

    <div id="typeGame" class="hidden">
      <div id="typeTarget"></div>
      <input id="typeInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="TAPER LA SÉQUENCE...">
    </div>

    <div class="log" id="hackLog"></div>
  </div>

  <!-- RESULT -->
  <div id="resultScreen" class="screen hidden">
    <div class="center">
      <div class="logo" id="resultTitle" style="font-size:28px;">ACCÈS ACCORDÉ</div>
      <div id="resultDetail" style="font-size:12px; color:var(--phosphor-dim); letter-spacing:1px;"></div>
      <button class="btn big" id="continueBtn" style="max-width:260px;">▶ CONTINUER</button>
    </div>
  </div>

  <div class="scanlines"></div>
  <div class="vignette"></div>
</div>

<script>
(function(){
  const boot = document.getElementById('boot');
  const menuScreen = document.getElementById('menuScreen');
  const hackScreen = document.getElementById('hackScreen');
  const resultScreen = document.getElementById('resultScreen');
  const nodeList = document.getElementById('nodeList');
  const repVal = document.getElementById('repVal');
  const creditVal = document.getElementById('creditVal');

  // ---------------- Persistent state ----------------
  let rep = 0, credits = 0;
  let unlockedCount = 1;
  try{
    rep = parseInt(localStorage.getItem('nt_rep')||'0',10)||0;
    credits = parseInt(localStorage.getItem('nt_credits')||'0',10)||0;
    unlockedCount = parseInt(localStorage.getItem('nt_unlocked')||'1',10)||1;
  }catch(e){}

  function save(){
    try{
      localStorage.setItem('nt_rep', String(rep));
      localStorage.setItem('nt_credits', String(credits));
      localStorage.setItem('nt_unlocked', String(unlockedCount));
    }catch(e){}
  }

  const NODES = [
    {id:0, name:'SERVEUR RELAIS // PÉRIPHÉRIE', diff:'low',  reward:80,  rep:5,  game:'memory', param:3},
    {id:1, name:'PARE-FEU MUNICIPAL // SECT-B',  diff:'low',  reward:120, rep:8,  game:'type',   param:6},
    {id:2, name:'NŒUD FINANCIER // CORP-XVI',    diff:'mid',  reward:220, rep:14, game:'memory', param:4},
    {id:3, name:'BASTION CRYPTÉ // ARCHIVE-9',   diff:'mid',  reward:280, rep:18, game:'type',   param:9},
    {id:4, name:'NOYAU IA // PROJET ECLIPSE',    diff:'high', reward:500, rep:35, game:'memory', param:5},
    {id:5, name:'BLACKSITE // ORIGINE INCONNUE', diff:'high', reward:750, rep:50, game:'type',   param:12},
  ];

  let currentNode = null;

  // ---------------- Boot sequence ----------------
  const bootLines = [
    '&gt; INITIALISATION NULLTRACE OS v3.2',
    '&gt; CHARGEMENT MODULES CRYPTO... OK',
    '&gt; VÉRIFICATION SANDBOX ISOLÉE... OK',
    '&gt; AVERTISSEMENT: ENVIRONNEMENT 100% SIMULÉ',
    '&gt; AUCUN RÉSEAU RÉEL N\\'EST CONTACTÉ',
    '&gt; CHARGEMENT INTERFACE...',
    '&gt; PRÊT.'
  ];
  bootLines.forEach((t,i)=>{
    const d = document.createElement('div');
    d.className = 'boot-line';
    d.innerHTML = t;
    boot.appendChild(d);
  });

  function runBoot(){
    const lines = boot.querySelectorAll('.boot-line');
    let i=0;
    const iv = setInterval(()=>{
      if(i < lines.length){
        lines[i].classList.add('show');
        i++;
      } else {
        clearInterval(iv);
        setTimeout(()=>{
          boot.classList.add('hidden');
          showMenu();
        }, 500);
      }
    }, 260);
  }

  // ---------------- Menu / node list ----------------
  function showMenu(){
    menuScreen.classList.remove('hidden');
    hackScreen.classList.add('hidden');
    resultScreen.classList.add('hidden');
    repVal.textContent = rep;
    creditVal.textContent = credits;
    renderNodes();
  }

  function renderNodes(){
    nodeList.innerHTML = '';
    NODES.forEach((n, idx)=>{
      const locked = idx >= unlockedCount;
      const el = document.createElement('div');
      el.className = 'node' + (locked ? ' locked' : '');
      el.innerHTML = `
        <div class="info">
          <div class="name">${locked ? '??? NŒUD VERROUILLÉ' : n.name}</div>
          <div class="meta">
            <span class="diff ${n.diff}">${n.diff.toUpperCase()}</span>
            &nbsp;·&nbsp; RÉCOMPENSE: ${n.reward} cr · +${n.rep} rep
          </div>
        </div>
        <button class="btn ${locked?'':'amber'}" ${locked?'disabled':''} data-idx="${idx}">
          ${locked ? 'LOCK' : 'BREACH'}
        </button>
      `;
      nodeList.appendChild(el);
    });
    nodeList.querySelectorAll('button[data-idx]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const idx = parseInt(b.dataset.idx,10);
        startHack(NODES[idx]);
      });
    });
  }

  // ---------------- Hack screen dispatch ----------------
  const hackNodeName = document.getElementById('hackNodeName');
  const hackHeadline = document.getElementById('hackHeadline');
  const hackSub = document.getElementById('hackSub');
  const hackProgress = document.getElementById('hackProgress');
  const hackLog = document.getElementById('hackLog');
  const memGame = document.getElementById('memGame');
  const typeGame = document.getElementById('typeGame');
  const padGrid = document.getElementById('padGrid');
  const typeTarget = document.getElementById('typeTarget');
  const typeInput = document.getElementById('typeInput');
  const abortBtn = document.getElementById('abortBtn');

  function log(msg){
    const d = document.createElement('div');
    d.textContent = '> ' + msg;
    hackLog.appendChild(d);
    hackLog.scrollTop = hackLog.scrollHeight;
  }

  function startHack(node){
    currentNode = node;
    menuScreen.classList.add('hidden');
    hackScreen.classList.remove('hidden');
    hackNodeName.textContent = node.name;
    hackLog.innerHTML = '';
    hackProgress.style.width = '0%';
    log('connexion simulée établie...');
    log('cible: ' + node.name);

    if(node.game === 'memory'){
      memGame.classList.remove('hidden');
      typeGame.classList.add('hidden');
      hackHeadline.textContent = 'PHASE — SÉQUENCE MÉMOIRE';
      hackSub.textContent = 'Observe puis reproduis la séquence';
      startMemoryGame(node.param);
    } else {
      memGame.classList.add('hidden');
      typeGame.classList.remove('hidden');
      hackHeadline.textContent = 'PHASE — CONTOURNEMENT PARE-FEU';
      hackSub.textContent = 'Retape le code exact avant expiration';
      startTypeGame(node.param);
    }
  }

  abortBtn.addEventListener('click', ()=>{
    log('abandon de la connexion...');
    setTimeout(showMenu, 300);
  });

  // ---------------- Minigame 1: memory sequence ----------------
  let memSeq = [], memInput = [], memRound = 0, memRoundsTotal = 1;

  function startMemoryGame(gridComplexity){
    padGrid.innerHTML = '';
    const n = 9;
    for(let i=0;i<n;i++){
      const p = document.createElement('div');
      p.className = 'pad';
      p.dataset.idx = i;
      p.textContent = '◈';
      padGrid.appendChild(p);
    }
    memRoundsTotal = gridComplexity;
    memRound = 0;
    memSeq = [];
    nextMemRound();
  }

  function nextMemRound(){
    memRound++;
    memInput = [];
    memSeq.push(Math.floor(Math.random()*9));
    hackProgress.style.width = Math.round((memRound-1)/memRoundsTotal*100) + '%';
    log('ronde ' + memRound + '/' + memRoundsTotal);
    playSequence();
  }

  function playSequence(){
    const pads = padGrid.querySelectorAll('.pad');
    pads.forEach(p=>p.classList.remove('correct','wrong'));
    let i = 0;
    setPadsClickable(false);
    const iv = setInterval(()=>{
      if(i>0){
        const prev = pads[memSeq[i-1]];
        prev.classList.remove('flash');
      }
      if(i < memSeq.length){
        pads[memSeq[i]].classList.add('flash');
        i++;
      } else {
        clearInterval(iv);
        setTimeout(()=>{
          pads[memSeq[memSeq.length-1]].classList.remove('flash');
          setPadsClickable(true);
        }, 400);
      }
    }, 550);
  }

  function setPadsClickable(on){
    const pads = padGrid.querySelectorAll('.pad');
    pads.forEach(p=>{
      p.onclick = on ? ()=>handlePadClick(parseInt(p.dataset.idx,10), p) : null;
    });
  }

  function handlePadClick(idx, el){
    memInput.push(idx);
    const pos = memInput.length - 1;
    if(idx === memSeq[pos]){
      el.classList.add('correct');
      setTimeout(()=>el.classList.remove('correct'),300);
      if(memInput.length === memSeq.length){
        if(memRound >= memRoundsTotal){
          hackProgress.style.width = '100%';
          log('séquence complète. déchiffrement...');
          setTimeout(()=>finishHack(true), 700);
        } else {
          setTimeout(nextMemRound, 500);
        }
      }
    } else {
      el.classList.add('wrong');
      document.getElementById('app').classList.add('flicker');
      setTimeout(()=>document.getElementById('app').classList.remove('flicker'),200);
      log('erreur de séquence — contre-mesure détectée');
      setPadsClickable(false);
      setTimeout(()=>finishHack(false), 500);
    }
  }

  // ---------------- Minigame 2: typing ----------------
  const CHARS = 'ABCDEF0123456789';
  let typeTargetStr = '', typeTimeLeft = 0, typeTimerIv = null;

  function randCode(len){
    let s = '';
    for(let i=0;i<len;i++) s += CHARS[Math.floor(Math.random()*CHARS.length)];
    return s;
  }

  function startTypeGame(len){
    typeTargetStr = randCode(len);
    typeInput.value = '';
    renderTypeTarget();
    typeTimeLeft = Math.max(6, len * 1.1);
    hackProgress.style.width = '100%';
    log('code cible généré: ' + len + ' caractères');
    clearInterval(typeTimerIv);
    typeTimerIv = setInterval(()=>{
      typeTimeLeft -= 0.1;
      hackProgress.style.width = Math.max(0, (typeTimeLeft/(len*1.1))*100) + '%';
      if(typeTimeLeft <= 0){
        clearInterval(typeTimerIv);
        log('délai dépassé — connexion coupée');
        finishHack(false);
      }
    }, 100);
    setTimeout(()=>typeInput.focus(), 100);
  }

  function renderTypeTarget(){
    const val = typeInput.value;
    let html = '';
    for(let i=0;i<typeTargetStr.length;i++){
      const cls = i < val.length ? (val[i]===typeTargetStr[i] ? 'ok' : 'wrong') : 'todo';
      html += `<span class="${cls}">${typeTargetStr[i]}</span>`;
    }
    typeTarget.innerHTML = html;
  }

  typeInput.addEventListener('input', ()=>{
    typeInput.value = typeInput.value.toUpperCase().replace(/[^A-F0-9]/g,'');
    renderTypeTarget();
    if(typeInput.value.length >= typeTargetStr.length){
      clearInterval(typeTimerIv);
      const success = typeInput.value === typeTargetStr;
      log(success ? 'code validé.' : 'code incorrect.');
      setTimeout(()=>finishHack(success), 400);
    }
  });

  // ---------------- Finish ----------------
  const resultTitle = document.getElementById('resultTitle');
  const resultDetail = document.getElementById('resultDetail');
  const continueBtn = document.getElementById('continueBtn');

  function finishHack(success){
    hackScreen.classList.add('hidden');
    resultScreen.classList.remove('hidden');
    const idx = NODES.indexOf(currentNode);
    if(success){
      resultTitle.textContent = 'ACCÈS ACCORDÉ';
      resultTitle.style.color = 'var(--phosphor)';
      credits += currentNode.reward;
      rep += currentNode.rep;
      if(idx === unlockedCount - 1 && unlockedCount < NODES.length){
        unlockedCount++;
        resultDetail.innerHTML = `+${currentNode.reward} crédits · +${currentNode.rep} rép.<br>NOUVEAU NŒUD DÉVERROUILLÉ`;
      } else {
        resultDetail.innerHTML = `+${currentNode.reward} crédits · +${currentNode.rep} rép.`;
      }
      save();
    } else {
      resultTitle.textContent = 'CONNEXION ÉCHOUÉE';
      resultTitle.style.color = 'var(--red)';
      resultDetail.textContent = 'Trace détectée — aucune récompense';
    }
  }

  continueBtn.addEventListener('click', showMenu);

  // ---------------- Boot ----------------
  runBoot();
})();
</script>
</body>
</html>
